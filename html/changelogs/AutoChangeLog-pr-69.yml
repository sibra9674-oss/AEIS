changes:
  - balance: "Переработка буров. Теперь после 15 минут работы бура он переходит в режим \"глубокой добычи\" и добывает в 3 раза меньше поинтов и автоматически отправляет их в карго, сломать ксены его при этом не могут. (Если в нём были улучшения, то они выпадают из него, а ящики лежавшие до перехода продаются по обычной цене)"
  - rscadd: "Оповещение ксенам, когда бур полностью починили."